# This configuration was generated with the setup-qlty-toml skill.
# For reference: https://docs.qlty.sh/qlty-toml
config_version = "0"

exclude_patterns = [
  "**/node_modules/**",
  "**/dist/**",
  "**/build/**",
  "**/*.min.*",
  "**/*.d.ts",
  "**/.terraform/**",
  "**/.terraform.lock.hcl",
]

test_patterns = [
  "**/test/**",
  "**/tests/**",
  "**/*.test.*",
  "**/*.spec.*",
]

[smells]
mode = "comment"

# Required — points to the built-in Qlty plugin registry.
[[source]]
name = "default"
default = true

# ── Frontend (React + TypeScript) ─────────────────────────────────────────────

# Use package_file without package_filters so all devDependencies are installed
# (package_filters prefix-matches by name; scoped packages like @typescript-eslint/*
# won't match a filter of "eslint" and would cause the build to error)
[[plugin]]
name = "eslint"
mode = "comment"
prefix = "frontend"
config_files = ["frontend/.eslintrc.js"]
package_file = "frontend/package.json"
affects_cache = ["frontend/tsconfig.json"]

[[plugin]]
name = "tsc"
mode = "comment"
prefix = "frontend"
config_files = ["frontend/tsconfig.json"]
skip_upstream = true

# ── Backend (Python FastAPI) ──────────────────────────────────────────────────

[[plugin]]
name = "ruff"
mode = "comment"
prefix = "backend"
config_files = ["backend/pyproject.toml"]

[[plugin]]
name = "mypy"
mode = "comment"
prefix = "backend"
config_files = ["backend/pyproject.toml"]

# ── Infrastructure (Terraform) ────────────────────────────────────────────────

[[plugin]]
name = "terraform"
mode = "comment"
prefix = "infra"

[[plugin]]
name = "tflint"
mode = "comment"
prefix = "infra"

[[plugin]]
name = "checkov"
mode = "block"
prefix = "infra"

# ── Security scanners (global) ────────────────────────────────────────────────

[[plugin]]
name = "trufflehog"
mode = "block"

[[plugin]]
name = "osv-scanner"
mode = "block"

# ── Cross-language tools (global) ─────────────────────────────────────────────

[[plugin]]
name = "actionlint"
mode = "comment"

[[plugin]]
name = "yamllint"
mode = "comment"
